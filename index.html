<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel Under</title>
<style>
body{
  font-family: Arial;
  text-align:center;
  background:#111;
  color:#fff;
  margin:0;
  padding:16px 12px;
}
h3{
  margin:0;
}
.subtitle{
  margin-top:8px;
  color:#bbb;
  font-size:13px;
}
#tempo{
  font-size:30px;
  margin-top:25px;
}
#odd{
  font-size:70px;
  margin-top:15px;
  color:#00ff88;
}
#percentual{
  font-size:25px;
  margin-top:10px;
  color:#ffaa00;
}
#media{
  font-size:20px;
  margin-top:5px;
}
#mediaGeral{
  font-size:18px;
  margin-top:5px;
  color:#00bfff;
}
#tendencia{
  font-size:18px;
  margin-top:5px;
}
#erro{
  color:red;
  margin-top:10px;
}
</style>
</head>
<body>

<h3>Painel Under</h3>
<div class="subtitle">A captura é iniciada pela tela Home ao selecionar um jogo.</div>

<div id="tempo">--:--</div>
<div id="odd">--</div>
<div id="percentual">--</div>
<div id="media">Média minuto: --</div>
<div id="mediaGeral">Média geral: --</div>
<div id="tendencia">Tendência: --</div>
<div id="erro"></div>

<script>
const erroEl = document.getElementById("erro");

if (!window.api) {
  erroEl.innerText = "ERRO: window.api não existe (preload não carregou). Verifique o preload.js no main.";
}

window.api?.onAtualizarDados((dados)=>{
  const oddEl = document.getElementById("odd");
  const tempoEl = document.getElementById("tempo");
  const percentualEl = document.getElementById("percentual");
  const mediaEl = document.getElementById("media");
  const mediaGeralEl = document.getElementById("mediaGeral");
  const tendenciaEl = document.getElementById("tendencia");

  oddEl.innerText = dados.odd ?? "--";
  tempoEl.innerText = dados.tempo ?? "--:--";

  if (dados.percentual !== null && dados.percentual !== undefined) {
    const perc = dados.percentual;
    percentualEl.innerText = perc.toFixed(2) + " %";

    if (dados.mediaMinuto !== null && dados.mediaMinuto !== undefined) {
      mediaEl.innerText = "Média minuto: " + dados.mediaMinuto.toFixed(2) + " %";
    } else {
      mediaEl.innerText = "Média minuto: --";
    }

    if (dados.mediaGeral !== null && dados.mediaGeral !== undefined) {
      mediaGeralEl.innerText = "Média geral: " + dados.mediaGeral.toFixed(2) + " %";
    } else {
      mediaGeralEl.innerText = "Média geral: --";
    }

    if (dados.tendencia === "subindo") {
      tendenciaEl.innerText = "Tendência: ↑ Subindo";
      tendenciaEl.style.color = "#00ff88";
    } else if (dados.tendencia === "caindo") {
      tendenciaEl.innerText = "Tendência: ↓ Caindo";
      tendenciaEl.style.color = "#ff4444";
    } else {
      tendenciaEl.innerText = "Tendência: → Estável";
      tendenciaEl.style.color = "#fff";
    }
  } else {
    percentualEl.innerText = "--";
    mediaEl.innerText = "Média minuto: --";
    mediaGeralEl.innerText = "Média geral: --";
    tendenciaEl.innerText = "Tendência: --";
    percentualEl.style.color = "#ffaa00";
  }
});

window.api?.onErro((msg)=>{
  erroEl.innerText = msg;
});
</script>

</body>
</html>
