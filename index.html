<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel Under</title>
<style>
body{
  font-family: Arial;
  text-align:center;
  background:#111;
  color:#fff;
}
input{
  width:85%;
  padding:8px;
  margin-top:10px;
}
button{
  padding:10px 20px;
  margin-top:15px;
  cursor:pointer;
}
#tempo{
  font-size:30px;
  margin-top:25px;
}
#odd{
  font-size:70px;
  margin-top:15px;
  color:#00ff88;
}
#percentual{
  font-size:25px;
  margin-top:10px;
  color:#ffaa00;
}
#media{
  font-size:20px;
  margin-top:5px;
}
#mediaGeral{
  font-size:18px;
  margin-top:5px;
  color:#00bfff;
}
#tendencia{
  font-size:18px;
  margin-top:5px;
}
#erro{
  color:red;
  margin-top:10px;
}
.radio-group{
  margin-top:10px;
}
.radio-group input{
  width:auto;
}
</style>
</head>
<body>

<h3>Painel Under</h3>

<input id="urlOdds" placeholder="Cole a URL da Odd (Layback)">
<br>
<input id="urlTempo" placeholder="Cole a URL do Tempo">
<br>
<input id="acrescimos" type="number" value="5" placeholder="Acréscimos (padrão 5)">
<br>

<div class="radio-group">
  <label>
    <input type="radio" name="tempoJogo" value="45" checked>
    1º Tempo
  </label>

  <label style="margin-left:15px;">
    <input type="radio" name="tempoJogo" value="90">
    2º Tempo
  </label>
</div>

<button id="btn">Iniciar</button>

<div id="tempo">--:--</div>
<div id="odd">--</div>
<div id="percentual">--</div>
<div id="media">Média minuto: --</div>
<div id="mediaGeral">Média geral: --</div>
<div id="tendencia">Tendência: --</div>
<div id="erro"></div>

<script>
const erroEl = document.getElementById("erro");

// ✅ Se preload não carregar, mostra o motivo (ao invés de “tela muda”)
if (!window.api) {
  erroEl.innerText = "ERRO: window.api não existe (preload não carregou). Verifique o preload.js no main.";
}

// ✅ ajuda foco (às vezes mac perde foco fácil)
window.addEventListener("click", (e) => {
  if (e.target && e.target.tagName === "INPUT") e.target.focus();
});

// 🔹 BOTÃO INICIAR
document.getElementById("btn").addEventListener("click", () => {
  const urlOdds = document.getElementById("urlOdds").value;
  const urlTempo = document.getElementById("urlTempo").value;
  const acrescimos = document.getElementById("acrescimos").value;

  const tempoBase = document.querySelector('input[name="tempoJogo"]:checked').value;

  window.api?.iniciarCaptura({ urlOdds, urlTempo, acrescimos, tempoBase });
});

// 🔹 ATUALIZAR ACRÉSCIMOS AUTOMATICAMENTE
document.getElementById("acrescimos").addEventListener("input", function () {
  window.api?.atualizarAcrescimos(this.value);
});

// 🔹 ATUALIZAÇÃO DOS DADOS
window.api?.onAtualizarDados((dados)=>{
  const oddEl = document.getElementById("odd");
  const tempoEl = document.getElementById("tempo");
  const percentualEl = document.getElementById("percentual");
  const mediaEl = document.getElementById("media");
  const mediaGeralEl = document.getElementById("mediaGeral");
  const tendenciaEl = document.getElementById("tendencia");

  oddEl.innerText = dados.odd ?? "--";
  tempoEl.innerText = dados.tempo ?? "--:--";

  if (dados.percentual !== null && dados.percentual !== undefined) {
    const perc = dados.percentual;
    percentualEl.innerText = perc.toFixed(2) + " %";

    if (dados.mediaMinuto !== null && dados.mediaMinuto !== undefined) {
      mediaEl.innerText = "Média minuto: " + dados.mediaMinuto.toFixed(2) + " %";
    } else {
      mediaEl.innerText = "Média minuto: --";
    }

    if (dados.mediaGeral !== null && dados.mediaGeral !== undefined) {
      mediaGeralEl.innerText = "Média geral: " + dados.mediaGeral.toFixed(2) + " %";
    } else {
      mediaGeralEl.innerText = "Média geral: --";
    }

    if (dados.tendencia === "subindo") {
      tendenciaEl.innerText = "Tendência: ↑ Subindo";
      tendenciaEl.style.color = "#00ff88";
    } else if (dados.tendencia === "caindo") {
      tendenciaEl.innerText = "Tendência: ↓ Caindo";
      tendenciaEl.style.color = "#ff4444";
    } else {
      tendenciaEl.innerText = "Tendência: → Estável";
      tendenciaEl.style.color = "#fff";
    }
  } else {
    percentualEl.innerText = "--";
    mediaEl.innerText = "Média minuto: --";
    mediaGeralEl.innerText = "Média geral: --";
    tendenciaEl.innerText = "Tendência: --";
    percentualEl.style.color = "#ffaa00";
  }
});

// 🔹 ERROS
window.api?.onErro((msg)=>{
  erroEl.innerText = msg;
});
</script>

</body>
</html>
