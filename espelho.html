<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>PiP</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #fff;
      font-family: Arial, system-ui, sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── barra ── */
    .bar {
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 6px;
      background: #1a1a1a;
      border-bottom: 1px solid rgba(255,255,255,.08);
      flex-shrink: 0;
      height: 32px;
    }

    .bar-btns {
      -webkit-app-region: no-drag;
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    .bar-btn {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-close { background: #ff5f57; }
    .btn-min   { background: #febc2e; }

    .url-wrap {
      -webkit-app-region: no-drag;
      flex: 1;
      display: flex;
      align-items: center;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 6px;
      padding: 0 8px;
      height: 22px;
      gap: 5px;
    }
    .url-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 11px;
    }
    .url-input::placeholder { color: rgba(255,255,255,.35); }

    .nav-btn {
      -webkit-app-region: no-drag;
      background: none;
      border: none;
      color: rgba(255,255,255,.5);
      font-size: 12px;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
    }
    .nav-btn:hover { color: #fff; }
    .nav-btn:disabled { opacity: .2; cursor: default; }

    /* ── webview ── */
    webview {
      flex: 1;
      width: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <div class="bar">
    <div class="bar-btns">
      <button class="bar-btn btn-close" id="btnClose" title="Fechar"></button>
      <button class="bar-btn btn-min"   id="btnMin"   title="Minimizar"></button>
    </div>

    <button class="nav-btn" id="btnBack"    title="Voltar">‹</button>
    <button class="nav-btn" id="btnForward" title="Avançar">›</button>
    <button class="nav-btn" id="btnReload"  title="Recarregar">↻</button>

    <div class="url-wrap">
      <span style="font-size:10px;color:rgba(255,255,255,.3);">🔒</span>
      <input id="urlInput" class="url-input" type="text" placeholder="Digite uma URL e pressione Enter" spellcheck="false" />
    </div>
  </div>

  <webview id="wv" src="about:blank" allowpopups></webview>

  <script>
    const wv         = document.getElementById("wv");
    const urlInput   = document.getElementById("urlInput");
    const btnBack    = document.getElementById("btnBack");
    const btnForward = document.getElementById("btnForward");
    const btnReload  = document.getElementById("btnReload");

    function normalizeUrl(raw) {
      const s = raw.trim();
      if (!s) return "";
      if (/^https?:\/\//i.test(s)) return s;
      if (s.includes(".") && !s.includes(" ")) return "https://" + s;
      return "https://www.google.com/search?q=" + encodeURIComponent(s);
    }

    function navigate(url) {
      const full = normalizeUrl(url);
      if (full) wv.src = full;
    }

    urlInput.addEventListener("keydown", e => {
      if (e.key === "Enter") navigate(urlInput.value);
    });

    btnBack.addEventListener("click",    () => wv.canGoBack()    && wv.goBack());
    btnForward.addEventListener("click", () => wv.canGoForward() && wv.goForward());
    btnReload.addEventListener("click",  () => wv.reload());

    wv.addEventListener("did-navigate", e => {
      urlInput.value = e.url;
      btnBack.disabled    = !wv.canGoBack();
      btnForward.disabled = !wv.canGoForward();
    });

    wv.addEventListener("did-navigate-in-page", e => {
      urlInput.value = e.url;
    });

    document.getElementById("btnClose").addEventListener("click", () => {
      window.espelhoApi.close();
    });
    document.getElementById("btnMin").addEventListener("click", () => {
      window.espelhoApi.minimize();
    });

    // desabilita botões inicialmente
    btnBack.disabled    = true;
    btnForward.disabled = true;
  </script>
</body>
</html>
